<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pay-R | Quantum Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Hind Siliguri', 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass fixed top-0 w-full z-50 h-16 flex items-center px-5 justify-between">
        <div class="text-xl font-black tracking-tighter text-white">PAY<span class="text-violet-500">-R</span></div>
        <a href="/notice" class="text-slate-400"><i class="fa-regular fa-bell text-xl"></i></a>
    </nav>

    <div class="h-16"></div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 w-full glass h-18 flex justify-around items-center pb-2 z-50">
        <a href="/dashboard" class="text-violet-500 flex flex-col items-center"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">হোম</span></a>
        <a href="/tasks" class="text-slate-500 flex flex-col items-center"><i class="fa-solid fa-bolt text-xl"></i><span class="text-[10px] font-bold">টাস্ক</span></a>
        <a href="/withdraw" class="text-slate-500 flex flex-col items-center"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-bold">টাকা</span></a>
        <a href="/account" class="text-slate-500 flex flex-col items-center"><i class="fa-solid fa-user text-xl"></i><span class="text-[10px] font-bold">প্রোফাইল</span></a>
    </div>
</body>
</html>
