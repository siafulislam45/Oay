{% extends "layout.html" %}
{% block content %}

<style>
    /* AI Portal Animations */
    .portal-reveal { animation: portalIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes portalIn { from { opacity: 0; transform: scale(0.9) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    /* Glassmorphic Login Card */
    .ai-login-card {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Cyber Input Fields */
    .auth-input {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #f1f5f9;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .auth-input:focus {
        border-color: #8B5CF6;
        background: rgba(139, 92, 246, 0.05);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        outline: none;
    }

    .btn-authorize {
        background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        transition: all 0.3s ease;
    }
    .btn-authorize:active { transform: scale(0.96); }

    /* Floating Blobs for Login */
    .auth-blob {
        position: absolute;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        z-index: -1;
        filter: blur(40px);
    }
</style>

<div class="flex items-center justify-center min-h-[85vh] portal-reveal px-5 relative overflow-hidden">
    
    <!-- Decorative Ambient Glows -->
    <div class="auth-blob -top-10 -left-10"></div>
    <div class="auth-blob -bottom-10 -right-10"></div>

    <div class="ai-login-card w-full max-w-sm p-10 relative">
        
        <!-- 1. PORTAL HEADER -->
        <div class="text-center mb-10">
            <div class="relative inline-block mb-6">
                <!-- Glow Effect -->
                <div class="absolute inset-0 bg-violet-500 rounded-3xl blur-2xl opacity-20 animate-pulse"></div>
                <!-- Logo Node -->
                <div class="relative h-20 w-20 rounded-3xl bg-slate-900 border border-violet-500/30 flex items-center justify-center text-4xl text-violet-400 shadow-2xl">
                    <i class="fa-solid fa-fingerprint"></i>
                </div>
            </div>
            <h2 class="text-2xl font-black ai-gradient-text uppercase tracking-[2px]">অটোরাইজেশন</h2>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[3px] mt-1">Accessing Quantum Network</p>
        </div>

        <!-- 2. AUTHENTICATION FORM -->
        <form method="POST" action="/login" class="space-y-6">
            
            <!-- Email Field -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Access Email</label>
                <div class="relative group">
                    <span class="absolute left-4 top-4 text-slate-500 group-focus-within:text-violet-400 transition-colors">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required 
                           class="auth-input w-full pl-12 p-4 rounded-2xl text-sm font-medium tracking-tight" 
                           placeholder="yournode@mail.com">
                </div>
            </div>
            
            <!-- Password Field -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1">Secret Key</label>
                <div class="relative group">
                    <span class="absolute left-4 top-4 text-slate-500 group-focus-within:text-violet-400 transition-colors">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" name="password" id="passwordInput" required 
                           class="auth-input w-full pl-12 pr-12 p-4 rounded-2xl text-sm font-medium" 
                           placeholder="••••••••">
                    
                    <!-- Toggle Visibility -->
                    <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-600 hover:text-violet-400 transition-colors" onclick="togglePassword()">
                        <i id="eyeIcon" class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
                
                <div class="flex justify-end pr-1">
                    <a href="#" class="text-[9px] font-black text-slate-600 hover:text-violet-400 uppercase tracking-widest transition-all">Forgot Key?</a>
                </div>
            </div>

            <!-- Authorization Action -->
            <button type="submit" class="btn-authorize w-full py-5 rounded-2xl text-white font-black text-sm uppercase tracking-[3px] shadow-2xl flex items-center justify-center gap-3 mt-6">
                ইনিশিয়েট লগইন <i class="fa-solid fa-arrow-right-long"></i>
            </button>
        </form>
        
        <!-- 3. PORTAL FOOTER -->
        <div class="mt-10 text-center">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-loose">
                একাউন্ট নেই? 
                <a href="/register" class="text-violet-400 font-black ml-1 underline decoration-violet-500/20 underline-offset-4">
                    নতুন নোড খুলুন
                </a>
            </p>
        </div>

        <!-- Meta Tagline -->
        <div class="absolute -bottom-10 left-0 w-full text-center opacity-20">
            <p class="text-[8px] font-mono text-slate-500 uppercase tracking-tighter">Secure P2P Node Access • Pay-R Framework</p>
        </div>

    </div>
</div>

<!-- Password Visibility Logic -->
<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
            icon.style.color = "#8B5CF6";
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
            icon.style.color = "";
        }
    }
</script>

{% endblock %}
