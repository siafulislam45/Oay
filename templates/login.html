{% extends "layout.html" %}

{% block content %}

<style>
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    
    .glass-card-auth {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
    }
</style>

<div class="flex items-center justify-center min-h-[85vh] py-6 fade-up">
    
    <div class="glass-card-auth w-full max-w-sm p-8 rounded-[32px] relative overflow-hidden">
        
        <!-- Decorative Background Blurs -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[50px] opacity-20 -mr-10 -mt-10"></div>
        <div class="absolute bottom-0 left-0 w-24 h-24 bg-teal-500 rounded-full mix-blend-multiply filter blur-[40px] opacity-20 -ml-10 -mb-10"></div>

        <!-- 1. Header -->
        <div class="text-center mb-8 relative z-10">
            <div class="h-16 w-16 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm transform -rotate-3 border border-emerald-100">
                <i class="fa-solid fa-right-to-bracket"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
            <p class="text-xs text-slate-500 font-medium mt-1">আপনার একাউন্টে লগ ইন করুন</p>
        </div>

        <!-- 2. Login Form -->
        <form method="POST" action="/login" class="space-y-5 relative z-10">
            
            <!-- Email Input -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">ইমেইল এড্রেস</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-slate-400 group-focus-within:text-emerald-500 transition"></i>
                    </div>
                    <input type="email" name="email" required 
                           class="w-full pl-10 p-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition text-sm font-semibold text-slate-800 bg-slate-50 focus:bg-white" 
                           placeholder="user@gmail.com">
                </div>
            </div>
            
            <!-- Password Input -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">পাসওয়ার্ড</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-emerald-500 transition"></i>
                    </div>
                    <input type="password" name="password" id="passwordInput" required 
                           class="w-full pl-10 pr-10 p-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition text-sm font-bold text-slate-800 bg-slate-50 focus:bg-white" 
                           placeholder="••••••••">
                    
                    <!-- Eye Icon (Toggle) -->
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-slate-400 hover:text-emerald-600 transition" onclick="togglePassword()">
                        <i id="eyeIcon" class="fa-regular fa-eye-slash"></i>
                    </div>
                </div>
                
                <!-- Forgot Password Link -->
                <div class="text-right mt-2">
                    <a href="https://wa.me/8801894577178" target="_blank" class="text-[10px] font-bold text-slate-400 hover:text-emerald-600 transition">পাসওয়ার্ড ভুলে গেছেন?</a>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-emerald w-full text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 mt-6 uppercase tracking-wider">
                <span>লগ ইন করুন</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <!-- 3. Footer / Register Link -->
        <div class="mt-8 text-center pt-4 relative z-10">
            <p class="text-xs font-semibold text-slate-500">
                একাউন্ট নেই? 
                <a href="/register" class="text-emerald-600 font-black hover:underline ml-1">
                    নতুন একাউন্ট খুলুন
                </a>
            </p>
        </div>

    </div>
</div>

<!-- Password Toggle Script -->
<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
            icon.classList.add('text-emerald-500');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
            icon.classList.remove('text-emerald-500');
        }
    }
</script>

{% endblock %}
