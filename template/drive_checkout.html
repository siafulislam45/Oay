{% extends "layout.html" %}
{% block content %}

<div class="max-w-md mx-auto">
    <!-- Pack Summary -->
    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-50 text-center mb-6">
        <p class="text-xs text-slate-500 font-bold uppercase">You are buying</p>
        <h2 class="text-xl font-bold text-[#0A2540] mt-1">{{ pack.title }}</h2>
        <p class="text-sm text-gray-500">{{ pack.operator }} | {{ pack.validity }}</p>
        <div class="mt-3 inline-block bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full text-lg font-bold">
            ৳ {{ pack.offer_price }}
        </div>
    </div>

    <!-- Payment Form -->
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-50">
        <h3 class="font-bold text-slate-700 mb-4 text-sm">পেমেন্ট এবং নাম্বার দিন</h3>
        
        <!-- Admin Number Display -->
        <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-100 mb-4 text-xs text-yellow-800">
            <p class="font-bold mb-1">Send Money to: 01912107604</p>
            <p>টাকা পাঠিয়ে নিচের ফর্মে ট্রানজেকশন আইডি দিন।</p>
        </div>

        <form method="POST" class="space-y-4">
            
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1">অফারটি যে নাম্বারে নিবেন</label>
                <input type="number" name="mobile" required placeholder="017xxxxxxxx" class="w-full p-3 border rounded-xl focus:outline-indigo-500 bg-slate-50">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1">পেমেন্ট মেথড</label>
                <select name="method" class="w-full p-3 border rounded-xl bg-slate-50">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Rocket">Rocket</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">আপনার নাম্বার</label>
                    <input type="text" name="sender" required placeholder="Sender No" class="w-full p-3 border rounded-xl bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">TrxID</label>
                    <input type="text" name="trx_id" required placeholder="TrxID" class="w-full p-3 border rounded-xl bg-slate-50">
                </div>
            </div>

            <button type="submit" class="w-full bg-[#0A2540] text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg">
                কনফার্ম অর্ডার
            </button>
        </form>
    </div>
</div>
{% endblock %}
