{% extends "layout.html" %}

{% block content %}

<style>
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
    }
</style>

<div class="flex items-center justify-center min-h-[80vh] fade-up px-4">
    
    <div class="glass-card w-full max-w-sm p-8 rounded-[35px] relative overflow-hidden">
        
        <!-- Decorative Background Blurs -->
        <div class="absolute top-0 left-0 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-32 h-32 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-4000"></div>

        <!-- 1. Header & Logo -->
        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-[#4F46E5] to-[#7C3AED] text-white text-3xl shadow-lg shadow-indigo-200 mb-4 transform rotate-3 hover:rotate-0 transition duration-300">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Welcome Back</h2>
            <p class="text-sm text-slate-500 mt-1">আপনার একাউন্টে লগ ইন করুন</p>
        </div>

        <!-- 2. Login Form -->
        <form method="POST" action="/login" class="space-y-5 relative z-10">
            
            <!-- Email Input -->
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 ml-1">ইমেইল এড্রেস</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-slate-400 group-focus-within:text-[#4F46E5] transition"></i>
                    </div>
                    <input type="email" name="email" required 
                           class="w-full pl-11 p-3.5 border border-slate-200 rounded-2xl bg-slate-50/50 focus:bg-white focus:outline-none focus:border-[#4F46E5] focus:ring-4 focus:ring-indigo-500/10 transition text-sm font-medium text-slate-700" 
                           placeholder="example@mail.com">
                </div>
            </div>
            
            <!-- Password Input -->
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 ml-1">পাসওয়ার্ড</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-[#4F46E5] transition"></i>
                    </div>
                    <input type="password" name="password" id="passwordInput" required 
                           class="w-full pl-11 pr-10 p-3.5 border border-slate-200 rounded-2xl bg-slate-50/50 focus:bg-white focus:outline-none focus:border-[#4F46E5] focus:ring-4 focus:ring-indigo-500/10 transition text-sm font-medium text-slate-700" 
                           placeholder="••••••••">
                    
                    <!-- Eye Icon (Toggle) -->
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-slate-400 hover:text-slate-600 transition" onclick="togglePassword()">
                        <i id="eyeIcon" class="fa-regular fa-eye-slash"></i>
                    </div>
                </div>
                
                <div class="text-right mt-2">
                    <a href="#" class="text-[10px] font-bold text-slate-400 hover:text-[#4F46E5] transition">পাসওয়ার্ড ভুলে গেছেন?</a>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-gradient-to-r from-[#4F46E5] to-[#7C3AED] text-white py-4 rounded-2xl font-bold text-base shadow-xl shadow-indigo-200 hover:shadow-indigo-300 hover:scale-[1.02] active:scale-95 transition flex items-center justify-center gap-2 mt-4">
                <span>লগ ইন</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <!-- 3. Footer / Register Link -->
        <div class="mt-8 text-center relative z-10">
            <p class="text-xs text-slate-500">
                একাউন্ট নেই? 
                <a href="/register" class="text-[#4F46E5] font-bold hover:underline ml-1">
                    নতুন একাউন্ট খুলুন
                </a>
            </p>
        </div>

    </div>
</div>

<!-- Password Toggle Script -->
<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
            icon.style.color = "#4F46E5";
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
            icon.style.color = "";
        }
    }
</script>

{% endblock %}
