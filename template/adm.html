{% extends "layout.html" %}
{% block content %}

<div class="max-w-md mx-auto space-y-6 fade-up pb-24 pt-4">

    <!-- Header -->
    <div class="text-center">
        <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-indigo-50 text-[#4F46E5] text-3xl shadow-sm mb-3">
            <i class="fa-solid fa-sliders"></i>
        </div>
        <h2 class="text-xl font-bold text-[#0A2540]">পেমেন্ট সেটআপ</h2>
        <p class="text-xs text-slate-500">টাকা তোলার জন্য আপনার নাম্বার সেট করুন</p>
    </div>

    <!-- Setup Form -->
    <div class="bg-white p-6 rounded-[30px] shadow-xl shadow-indigo-100 border border-slate-50">
        
        <form method="POST" action="/adm" class="space-y-5">
            
            <!-- Method Select -->
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-3 ml-1">পেমেন্ট মেথড</label>
                <div class="grid grid-cols-3 gap-3">
                    <!-- bKash -->
                    <label class="cursor-pointer group">
                        <input type="radio" name="method" value="bKash" class="peer sr-only" {{ 'checked' if user.wallet_method == 'bKash' }}>
                        <div class="py-3 border-2 border-slate-100 rounded-xl text-center peer-checked:border-[#E2136E] peer-checked:bg-pink-50 peer-checked:text-[#E2136E] transition hover:border-pink-200">
                            <span class="block text-xs font-bold">bKash</span>
                        </div>
                    </label>
                    <!-- Nagad -->
                    <label class="cursor-pointer group">
                        <input type="radio" name="method" value="Nagad" class="peer sr-only" {{ 'checked' if user.wallet_method == 'Nagad' }}>
                        <div class="py-3 border-2 border-slate-100 rounded-xl text-center peer-checked:border-[#F7931A] peer-checked:bg-orange-50 peer-checked:text-[#F7931A] transition hover:border-orange-200">
                            <span class="block text-xs font-bold">Nagad</span>
                        </div>
                    </label>
                    <!-- Rocket -->
                    <label class="cursor-pointer group">
                        <input type="radio" name="method" value="Rocket" class="peer sr-only" {{ 'checked' if user.wallet_method == 'Rocket' }}>
                        <div class="py-3 border-2 border-slate-100 rounded-xl text-center peer-checked:border-[#8C3494] peer-checked:bg-purple-50 peer-checked:text-[#8C3494] transition hover:border-purple-200">
                            <span class="block text-xs font-bold">Rocket</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Number Input -->
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 ml-1">আপনার ওয়ালেট নাম্বার</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <input type="number" name="number" required placeholder="017xxxxxxxx" value="{{ user.wallet_number or '' }}"
                           class="w-full pl-10 p-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-[#4F46E5] focus:ring-1 focus:ring-[#4F46E5] bg-slate-50 focus:bg-white transition text-sm font-bold text-slate-700">
                </div>
                <p class="text-[10px] text-orange-500 mt-2 ml-1">
                    <i class="fa-solid fa-triangle-exclamation"></i> সতর্কবার্তা: নাম্বারটি ভালো করে চেক করে সেভ করুন। ভুল নাম্বারে টাকা গেলে আমরা দায়ী থাকব না।
                </p>
            </div>

            <!-- Save Button -->
            <button type="submit" class="w-full bg-[#0A2540] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-[#4F46E5] transition active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> তথ্য সেভ করুন
            </button>

        </form>
    </div>

</div>
{% endblock %}
